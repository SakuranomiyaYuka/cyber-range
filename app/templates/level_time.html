{% extends "base.html" %}
{% block content %}
<div class="card">
    <h3>⏱ 时间盲注</h3>
    <form method="GET">
        <label>查询用户 ID</label>
        <input type="text" name="id" placeholder="例如: 1" value="{{ input or '' }}">
        <button type="submit">查询</button>
    </form>
</div>

{% if query %}
<div class="query-box">
    <div class="label">执行的 SQL：</div>
    <code>{{ query }}</code>
</div>
{% endif %}

{% if result %}
<div class="card">
    {% if result.status == 'error' %}
        <div class="result-error">{{ result.message }}</div>
    {% else %}
        <div class="result-success">{{ result.message }}</div>
    {% endif %}
</div>
{% endif %}
{% endblock %}
